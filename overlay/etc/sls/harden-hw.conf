# SLS appliance — disable unused OS services/hardware (Phase 3 harden)
# Installed as /etc/sls/harden-hw.conf — see docs/HARDEN-HARDWARE.md
#
# 1 = disable/mask that class; 0 = leave alone (lab may set 0)

DISABLE_BLUETOOTH=1
DISABLE_MODEM=1
DISABLE_CUPS=1
DISABLE_AVAHI=1
DISABLE_APPORT=1
DISABLE_FWUPD=1
DISABLE_THERMALD=1
DISABLE_SPICE_VDAGENT=1
# NetworkManager: keep for lab SSH / Wi‑Fi (set 1 only on sealed field units)
DISABLE_NETWORKMANAGER=0
