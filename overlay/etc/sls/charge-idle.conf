# SLS appliance: unattended charge → power off after N minutes
# See docs/CHARGE-IDLE-POWEROFF.md
#
# tablet-01 RCA: dedicated 5V charger — Kinect unusable while charging (12V path).
#   Leave ENABLED=1 so plug-in wake boots briefly then shuts down to charge.
# tablet-02 / OTG control-circuit charge: set ENABLED=0 if the unit must
#   stay on while powered from OTG (field run on that path).

ENABLED=1
IDLE_MINUTES=15
# Poll interval (seconds)
POLL_SEC=30
# Also treat rising battery % as charging (AXP288 often lies about status)
CAPACITY_TREND=1
