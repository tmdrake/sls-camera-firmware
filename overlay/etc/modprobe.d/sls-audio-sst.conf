# SLS appliance: force Intel SST (not SOF) for Cherry Trail / RT5651 speakers.
#
# RCA W101AS23T2 lab (validated 2026-07): ACPI 10EC5651 present; default SOF fails
#   sof-audio-acpi-intel-byt: No matching ASoC machine driver found
# With this file: card bytcrrt5651 binds; PipeWire "Built-in Audio Headphones" (UCM name).
#
# dsp_driver (kernel 7.0 / Ubuntu 26 — confirm: modinfo snd_intel_dspcfg | grep parm):
#   0=auto, 1=legacy, 2=SST, 3=SOF, 4=AVS   ← use 2 for SST (not "1")
#
# After install: update-initramfs -u then prefer COLD power-off/on (not remote soft
# reboot). Lab once needed manual reboot + BIOS defaults after a stuck soft reboot.
# Docs: docs/devices/rca-w101as23t2.md (speakers + SST reboot caution).
#
# Disable: rm this file; update-initramfs -u; cold power cycle.
options snd-intel-dspcfg dsp_driver=2
blacklist snd_sof_acpi_intel_byt
