# Appliance: avoid sleep/suspend during investigations.
# install-appliance.sh should install this under /etc/systemd/logind.conf.d/
# See docs/POWER-AND-DISPLAY.md
[Login]
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleSuspendKey=ignore
HandleHibernateKey=ignore
IdleAction=ignore
